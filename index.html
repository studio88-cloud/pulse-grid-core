<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PULSE GRID CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --card: #121212; --text: #f0f0f0;
            --accent: #bc13fe; --accent-glow: rgba(188, 19, 254, 0.5);
            --dot-base: #222;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }

        .container {
            width: 94%; max-width: 380px; background: var(--card); padding: 25px;
            border-radius: 40px; text-align: center; border: 1px solid #222;
            box-shadow: 0 30px 100px rgba(0,0,0,1); position: relative; height: 750px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        h1 { color: var(--accent); font-family: 'Orbitron', sans-serif; font-size: 1rem; margin: 0; text-shadow: 0 0 10px var(--accent-glow); line-height: 1.1; text-align: left; }
        .lab-toggle { background: #1a1a1a; border: 1px solid #333; color: var(--accent); padding: 8px 15px; border-radius: 12px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; }

        .beat-counter { display: flex; justify-content: center; align-items: center; gap: 14px; margin: 10px 0; min-height: 40px; }
        .beat-dot { width: 18px; height: 18px; border-radius: 50%; background: var(--dot-base); transition: 0.1s; border: 2px solid #333; }
        .beat-dot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); transform: scale(1.2); border-color: #fff; }

        .live-display { 
            background: #000; width: 100%; border-radius: 35px; border: 2px solid #1a1a1a; 
            padding: 20px; transition: 0.07s ease-out; display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 5px 0; position: relative; overflow: hidden; flex-grow: 1;
        }
        #song-title { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; z-index: 2; letter-spacing: 1px; }
        #bpm-val { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 7.5rem; line-height: 0.9; color: var(--accent); z-index: 2; }
        #time-sig-display { font-family: 'Orbitron'; font-size: 1.1rem; color: #555; margin-top: 10px; letter-spacing: 4px; z-index: 2; }
        .next-label { font-family: 'Orbitron'; font-size: 0.75rem; color: #444; margin-top: 15px; letter-spacing: 1.5px; z-index: 2; }

        .live-display.flash-full { background: var(--accent); border-color: #fff; }
        .live-display.flash-full * { color: #000 !important; }
        .live-display::before, .live-display::after {
            content: ''; position: absolute; top: 0; width: 14px; height: 100%;
            background: var(--accent); opacity: 0; transition: 0.07s; border-radius: 35px;
        }
        .live-display::before { left: -2px; } .live-display::after { right: -2px; }
        .live-display.flash-side::before, .live-display.flash-side::after { opacity: 1; }

        .controls-row { display: flex; gap: 10px; height: 75px; margin: 15px 0 10px 0; }
        .nav-btn { flex: 1; background: #1a1a1a; border: 1px solid #333; color: var(--accent); border-radius: 18px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; }
        .play-btn { flex: 1.8; background: var(--accent); border: none; color: black; border-radius: 18px; font-family: 'Orbitron'; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        .play-btn.stop { background: #000 !important; color: var(--accent) !important; border: 2px solid var(--accent); }

        .color-palette { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; padding-bottom: 5px; }
        .color-box { width: 26px; height: 26px; border-radius: 7px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-box.active { border-color: #fff; transform: scale(1.15); box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        #lab-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card); border-radius: 40px; padding: 20px;
            display: none; flex-direction: column; z-index: 100;
        }
        #lab-panel.active { display: flex; }
        .lab-input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 10px; margin-bottom: 6px; font-family: 'Inter'; width: 100%; font-size: 0.8rem; }
        .row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
        .playlist-manager { background: #1a1a1a; padding: 10px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .playlist-ctrl { display: flex; gap: 5px; margin-top: 8px; }
        .pl-btn { flex: 1; padding: 8px; font-size: 0.55rem; font-family: 'Orbitron'; cursor: pointer; border-radius: 5px; border: 1px solid #444; background: #222; color: #ccc; }
        #song-list-ui { flex-grow: 1; overflow-y: auto; text-align: left; margin-top: 10px; padding-right: 5px; }
        .song-item { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; border: 1px solid #222; }
        .edit-btn { color: var(--accent); background: none; border: 1px solid var(--accent); padding: 4px 8px; border-radius: 5px; font-size: 0.55rem; font-family: 'Orbitron'; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="drop-zone">
    <div class="header">
        <h1>PULSE GRID<br><span style="font-size:0.6rem; opacity:0.6">CORE</span></h1>
        <button class="lab-toggle" onclick="toggleLab()">LAB</button>
    </div>

    <div class="beat-counter" id="beat-counter"></div>

    <div class="live-display" id="main-display">
        <div id="song-title">CHOOSE LIST</div>
        <div id="bpm-val">--</div>
        <div id="time-sig-display">--</div>
        <div class="next-label">NEXT: <span id="next-song" style="color:#666">--</span></div>
    </div>

    <div class="controls-row">
        <button id="btn-prev" class="nav-btn">PREV</button>
        <button id="play-stop" class="play-btn" onclick="togglePlay()">IGNITE</button>
        <button id="btn-next" class="nav-btn">NEXT</button>
    </div>

    <div class="color-palette" id="color-palette"></div>

    <div id="lab-panel">
        <div style="display:flex; justify-content:space-between; font-family:Orbitron; color:var(--accent); margin-bottom:10px;">
            <span>MANAGER</span>
            <button onclick="toggleLab()" style="background:none; border:none; color:#fff; cursor:pointer;">CLOSE</button>
        </div>
        
        <div class="playlist-manager">
            <select id="pl-select" class="lab-input" style="margin:0;" onchange="switchPlaylist(this.value)"></select>
            <div class="playlist-ctrl">
                <button class="pl-btn" onclick="createNewPlaylist()">NEW LIST</button>
                <button class="pl-btn" style="color:#f04" onclick="deleteCurrentPlaylist()">DEL LIST</button>
            </div>
        </div>

        <input type="text" id="new-title" class="lab-input" placeholder="TITOLO BRANO">
        <div class="row">
            <input type="number" id="new-bpm" class="lab-input" placeholder="BPM" style="margin:0; flex:2;">
            <button class="pl-btn" style="height:35px;" onclick="handleTap()">TAP</button>
        </div>
        <div class="row">
            <input type="number" id="new-num" class="lab-input" value="4" style="margin:0; text-align:center;">
            <span style="font-family:Orbitron; color:#444;">/</span>
            <select id="new-den" class="lab-input" style="margin:0;">
                <option value="4">4</option>
                <option value="8">8</option>
                <option value="16">16</option>
            </select>
        </div>
        <button id="save-btn" onclick="addSong()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:10px; font-family:Orbitron; font-weight:900; cursor:pointer;">SAVE SONG</button>
        
        <div class="playlist-ctrl" style="margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; gap: 5px; flex-wrap: wrap;">
            <button class="pl-btn" style="color: #00e676; border-color: #00e676;" onclick="shareCurrentPlaylist()">SHARE LIST</button>
            <button class="pl-btn" onclick="exportData()">EXPORT BACKUP</button>
            <button class="pl-btn" onclick="document.getElementById('import-file').click()">IMPORT FILE</button>
            <input type="file" id="import-file" style="display:none" onchange="importData(event)">
        </div>

        <div id="song-list-ui"></div>
    </div>
</div>

    let db = JSON.parse(localStorage.getItem('pulse_db')) || {
        activeList: "DEFAULT",
        playlists: { "DEFAULT": [{ title: "START HERE", bpm: 120, num: 4, den: 4 }] },
        themeColor: "#bc13fe"
    };

    const colors = [
        { name: 'white', hex: '#ffffff' }, { name: 'yellow', hex: '#ffeb3b' },
        { name: 'green', hex: '#4caf50' }, { name
